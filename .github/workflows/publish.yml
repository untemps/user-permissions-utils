name: 'Publish'
on:
    push:
        branches:
            - main
            - beta
permissions:
    contents: write
    id-token: write
    pull-requests: write
    issues: write
jobs:
    check:
        uses: ./.github/workflows/check.yml
        secrets: inherit
    publish:
        needs: check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'yarn'
            - run: yarn install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist
            - run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
